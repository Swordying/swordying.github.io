<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Sudo乔木 的个人网站</title>
    <link rel="shortcut icon" href="./statics/img/web_logo.png" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <meta name="keywords" content="Sudo乔木,个人主页,简历展示" />
    <meta name="description" content="Sudo乔木的个人主页，个人作品导航，简历展示" />
    <meta name="copyright" content="http://www.zhangjianying.cn" />
    <meta name="author" content="Sudo乔木" />
    <!-- 最新版本的 Bootstrap 核心 CSS 文件 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
    <!-- jQuery -->
    <script src="https://cdn.bootcss.com/jquery/3.3.1/jquery.js"></script>
    <!-- 最新的 Bootstrap 核心 JavaScript 文件 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/js/bootstrap.min.js" integrity="sha384-Tc5IQib027qvyjSMfHjOMaLkfuWVxZxUPnCJA7l2mCWNIpG9mGCD8wGNIcPD7Txa" crossorigin="anonymous"></script>
    <style>
        body{
            padding-top:50px;
            min-width:300px;
        }
        #header .web_logo{
            max-height:24px;
        }
        #main .main_header{
            color:white;
            background:#6E8976 url(./statics/img/bs-docs-masthead-pattern.png) repeat center center;
        }
        /* #main .main{

        } */
        #main .code{
            background-color: #283646;
            color: #ddd;
            padding-top:1rem;
            padding-left:2rem;
            padding-bottom:1rem;
        }
        #main .my_page{
            width:100%;
            min-height:calc(100vh - 86px);
        }
    </style>
</head>
<body>
    <header id="header">
        <!-- navbar-inverse|default -->
        <nav class="navbar navbar-inverse navbar-fixed-top">
            <div class="container">
                <!-- Brand and toggle get grouped for better mobile display -->
                <div class="navbar-header">
                    <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#web_navbar-collapse-index" aria-expanded="false">
                        <span class="sr-only">导航切换</span>
                        <span class="icon-bar"></span>
                        <span class="icon-bar"></span>
                        <span class="icon-bar"></span>
                    </button>
                    <a class="navbar-brand navbar_web_logo" href="">
                        <img src="./statics/img/web_logo.png" alt="Sudo乔木" height=30 class="web_logo" />
                    </a>
                </div>

                <div class="collapse navbar-collapse navbar-right" id="web_navbar-collapse-index">
                    <ul class="nav navbar-nav web_nav_bar">
                        <li role="presentation" class="active my_contents" data-content_item="my_website" title="个人博客">
                            <a href="javascript:;">个人博客</a>
                        </li>
                        <li role="presentation" class="my_contents" data-content_item="my_gitsite" title="Gitee 码云"><a href="javascript:;">Gitee 码云</a></li>
                        <li role="presentation" class="my_contents" data-content_item="my_cv" title="Give Me a Star">
                            <a href="javascript:;">我的简历</a>
                        </li>
                    </ul> 
                </div>

            </div>
        </nav>
    </header>
    <div id="main">
        <div class="my_website my_content">
            <iframe class="my_page" src="http://www.zhangjianying.cn"></iframe>
        </div>
        <div class="my_gitsite my_content" hidden>
            <iframe class="my_page" src="https://gitee.com/swordying"></iframe>
        </div>
        <div class="my_cv my_content" hidden>
            <!-- <iframe class="my_page" src="https://gitee.com/swordying/swordying/raw/master/cv.md"></iframe> -->
            <iframe class="my_page" src="https://gitee.com/swordying/swordying/blob/master/cv.md#%E5%BC%A0%E5%89%91%E8%90%A5%E4%B8%AA%E4%BA%BA%E7%AE%80%E5%8E%86"></iframe>
        </div>
    </div>
    <footer id="footer">
        <div class="container-fluid text-center">
            <div class="container">
                <p>代码如诗诗如君</p>
            </div>
        </div>
    </footer>
    <script id="loading-html" src="https://loading-html.gitee.io/statics/plugs/loading-html/loading-html.min.js"></script>    
    <script>
        LoadingHtml.init();
    </script>
    <script>
        $(function(){
            $(".my_contents").click(function(){
                var data_content_item=$(this).data("content_item");
                $(".my_contents").removeClass("active");
                $(this).addClass("active");
                $(".my_content").hide();
                $('.'+data_content_item).show();
                $('.navbar-collapse').collapse("hide");
            });
        });
    </script>
    <script>
        $(function(){
            console.log("欢迎访问本页面...");
            console.log("Gitee 码云：https://gitee.com/swordying");
            console.log("个人主页：http://www.zhangjianying.cn");
        });
    </script>
</body>
</html>
